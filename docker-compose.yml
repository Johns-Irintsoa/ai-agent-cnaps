services:
  app:
    container_name: ai-agent-cnaps
    environment:
      # --- Configuration du Cache (Fix Permission Denied) ---
      - XDG_CACHE_HOME=/tmp/.cache
      - HF_HOME=/tmp/.cache
      - RAPIDOCR_CACHE=/tmp/.cache/rapidocr_models
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./data:/app/data
    extra_hosts:
      - "model-runner.docker.internal:host-gateway"